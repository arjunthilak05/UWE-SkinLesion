dataset:
  name: "HAM10000"
  num_classes: 7
  classes:
    - akiec
    - bcc
    - bkl
    - df
    - mel
    - nv
    - vasc
  class_counts:
    akiec: 327
    bcc: 514
    bkl: 1099
    df: 115
    mel: 1113
    nv: 6705
    vasc: 142

split:
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  stratify: true
  random_seed: 42

image:
  full_size: [450, 600]   # original HAM10000 resolution
  global_size: [380, 380] # EfficientNet-B4 input
  local_size: [224, 224]  # ResNet-50 input (cropped lesion)

dataloader:
  train_batch_size: 32
  val_batch_size: 64
  num_workers: 4  # safe for Windows
  pin_memory: true
  drop_last: true

augmentation:
  train:
    horizontal_flip_p: 0.5
    vertical_flip_p: 0.5
    rotate_limit: 45
    rotate_p: 0.7
    brightness_limit: 0.2
    contrast_limit: 0.2
    color_jitter_p: 0.3
    elastic_alpha: 1
    elastic_sigma: 50
    elastic_p: 0.3
    grid_distort_p: 0.2
    coarse_dropout_max_holes: 8
    coarse_dropout_max_height: 32
    coarse_dropout_max_width: 32
    coarse_dropout_p: 0.3
    normalize_mean: [0.7630392, 0.5456477, 0.5700401]  # HAM10000 stats
    normalize_std: [0.1409286, 0.1526127, 0.1699816]
  val:
    normalize_mean: [0.7630392, 0.5456477, 0.5700401]
    normalize_std: [0.1409286, 0.1526127, 0.1699816]
